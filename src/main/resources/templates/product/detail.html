<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title th:text="'商品詳細 - ' + ${name}">商品詳細</title>
</head>
<body>
  <h1>商品詳細ページ</h1>

  <p>商品ID：[[${product.id}]]</p>
  <p>商品名：[[${product.name}]]</p>
  <p>価格：[[${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}]]円</p>


  <a href="/products">▶ 商品一覧へ戻る</a>
</body>
</html>
